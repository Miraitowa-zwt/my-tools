<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 閾炬帴妫€鏌ュ伐鍏?/title>
  <style>
    :root {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --accent-light: #EFF6FF;
      --danger: #EF4444;
      --warning: #F59E0B;
      --success: #10B981;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-600: #4B5563;
      --gray-800: #1F2937;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #EFF6FF 0%, #F0FDF4 100%);
      min-height: 100vh;
      color: var(--gray-800);
    }

    /* 鈹€鈹€ Header 鈹€鈹€ */
    header {
      background: var(--primary);
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 13px; opacity: 0.7; margin-top: 2px; }

    /* 鈹€鈹€ Main Layout 鈹€鈹€ */
    main {
      max-width: 1200px;
      margin: 36px auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* 鈹€鈹€ Card 鈹€鈹€ */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      border: 1px solid var(--gray-200);
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 鈹€鈹€ Input Area 鈹€鈹€ */
    .input-hint {
      font-size: 13px;
      color: var(--gray-400);
      margin-bottom: 10px;
    }
    textarea {
      width: 100%;
      height: 180px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      font-family: "Courier New", monospace;
      color: var(--gray-800);
      resize: vertical;
      transition: border-color 0.2s;
      line-height: 1.7;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .url-count {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 6px;
      text-align: right;
    }

    /* 鈹€鈹€ Options Row 鈹€鈹€ */
    .options-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--gray-600);
      cursor: pointer;
    }
    .option-item input[type=checkbox] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* 鈹€鈹€ Buttons 鈹€鈹€ */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #2563EB; transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }

    .btn-outline {
      background: white;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }
    .btn-outline:hover { background: var(--accent-light); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover { background: #059669; transform: translateY(-1px); }
    .btn-success:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 鈹€鈹€ Progress 鈹€鈹€ */
    #progress-card { display: none; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .phase-badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .phase-fetch   { background: #DBEAFE; color: #1D4ED8; }
    .phase-check   { background: #FEF3C7; color: #B45309; }
    .phase-done    { background: #D1FAE5; color: #065F46; }
    .phase-init    { background: var(--gray-100); color: var(--gray-600); }

    .progress-bar-wrap {
      background: var(--gray-100);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #60A5FA);
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 13px;
      color: var(--gray-600);
      margin-top: 8px;
    }

    /* 鈹€鈹€ Stats Row 鈹€鈹€ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    .stat-card {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 16px 20px;
      border: 1px solid var(--gray-200);
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 4px;
    }
    .num-danger  { color: var(--danger); }
    .num-warning { color: var(--warning); }
    .num-success { color: var(--success); }
    .num-primary { color: var(--accent); }

    /* 鈹€鈹€ Results Table 鈹€鈹€ */
    #results-card { display: none; }

    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--gray-200);
      background: white;
      color: var(--gray-600);
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .search-input {
      padding: 7px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13px;
      width: 220px;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--gray-200);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr {
      background: var(--primary);
      color: white;
    }
    thead th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: background 0.15s;
    }
    tbody tr:hover { background: var(--accent-light); }
    tbody tr:last-child { border-bottom: none; }
    tbody td {
      padding: 10px 14px;
      vertical-align: middle;
      max-width: 260px;
    }
    .td-url {
      font-family: "Courier New", monospace;
      font-size: 12px;
      word-break: break-all;
      color: var(--accent);
    }
    .td-url a { color: inherit; text-decoration: none; }
    .td-url a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-404     { background: #FEE2E2; color: #B91C1C; }
    .badge-500     { background: #FEF3C7; color: #92400E; }
    .badge-timeout { background: #FEF9C3; color: #854D0E; }
    .badge-other   { background: var(--gray-100); color: var(--gray-600); }
    .badge-type    { background: #EDE9FE; color: #5B21B6; }
    .badge-pos     { background: #ECFDF5; color: #065F46; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* 鈹€鈹€ Responsive 鈹€鈹€ */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 0 16px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<header>
  <span class="logo">馃攳</span>
  <div>
    <h1>404 閾炬帴妫€鏌ュ伐鍏?/h1>
    <p>鎵归噺妫€娴嬮〉闈腑鐨勫け鏁堥摼鎺ワ紝鏀寔瀵煎嚭 Excel 鎶ュ憡</p>
  </div>
</header>

<main>

  <!-- 杈撳叆鍗＄墖 -->
  <div class="card">
    <div class="card-title">馃搵 杈撳叆寰呮鏌ョ殑椤甸潰 URL</div>
    <p class="input-hint">姣忚涓€涓?URL锛屾敮鎸?http/https锛屼緥濡傦細https://example.com/product/123</p>
    <textarea id="urlInput" placeholder="https://example.com/page1
https://example.com/page2
https://example.com/page3"></textarea>
    <div class="url-count" id="urlCount">宸茶緭鍏?0 涓?URL</div>

    <div class="options-row">
      <label class="option-item">
        <input type="checkbox" id="opt-img" checked> 妫€鏌ュ浘鐗囬摼鎺?      </label>
      <label class="option-item">
        <input type="checkbox" id="opt-css"> 妫€鏌?CSS/JS 璧勬簮
      </label>
      <label class="option-item">
        <input type="checkbox" id="opt-iframe" checked> 妫€鏌?iframe
      </label>
      <label class="option-item">
        <input type="checkbox" id="opt-only-errors" checked> 浠呮樉绀哄紓甯搁摼鎺?      </label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" onclick="startCheck()">
        馃殌 寮€濮嬫娴?      </button>
      <button class="btn btn-outline" id="stopBtn" onclick="stopCheck()" disabled>
        鈴?鍋滄
      </button>
      <button class="btn btn-success" id="exportBtn" onclick="exportExcel()" disabled>
        馃摜 瀵煎嚭 Excel
      </button>
    </div>
  </div>

  <!-- 杩涘害鍗＄墖 -->
  <div class="card" id="progress-card">
    <div class="card-title">鈿?妫€娴嬭繘搴?/div>
    <div class="progress-header">
      <span id="progressMsg" class="progress-text">鍒濆鍖栦腑...</span>
      <span class="phase-badge phase-init" id="phaseBadge">鍒濆鍖?/span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressDetail" style="margin-top:8px;"></div>

    <!-- 瀹炴椂缁熻 -->
    <div class="stats-row" style="margin-top:20px;">
      <div class="stat-card">
        <div class="num num-primary" id="stat-total">0</div>
        <div class="label">鎬绘娴嬮摼鎺?/div>
      </div>
      <div class="stat-card">
        <div class="num num-danger" id="stat-404">0</div>
        <div class="label">404 澶辨晥</div>
      </div>
      <div class="stat-card">
        <div class="num num-warning" id="stat-error">0</div>
        <div class="label">鍏朵粬閿欒</div>
      </div>
      <div class="stat-card">
        <div class="num num-success" id="stat-pages">0</div>
        <div class="label">宸叉壂鎻忛〉闈?/div>
      </div>
    </div>
  </div>

  <!-- 缁撴灉鍗＄墖 -->
  <div class="card" id="results-card">
    <div class="table-toolbar">
      <div class="filter-tabs" id="filterTabs">
        <div class="tab active" data-filter="all" onclick="filterResults('all', this)">鍏ㄩ儴</div>
        <div class="tab" data-filter="404" onclick="filterResults('404', this)">404</div>
        <div class="tab" data-filter="5xx" onclick="filterResults('5xx', this)">5xx 閿欒</div>
        <div class="tab" data-filter="timeout" onclick="filterResults('timeout', this)">瓒呮椂/澶辫仈</div>
      </div>
      <input class="search-input" type="text" placeholder="馃攷 鎼滅储閾炬帴鎴栭〉闈?.." oninput="searchResults(this.value)" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>闂閾炬帴</th>
            <th>鎵€鍦ㄩ〉闈?/th>
            <th>閿氭枃鏈?/th>
            <th>閿氭枃鏈被鍨?/th>
            <th>閾炬帴绫诲瀷</th>
            <th>HTML浣嶇疆</th>
            <th>鐘舵€佺爜</th>
            <th>妫€娴嬫椂闂?/th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="icon">鉁?/div>
      <p>澶浜嗭紒鏈彂鐜颁换浣曢棶棰橀摼鎺?/p>
    </div>
    <div style="font-size:12px;color:var(--gray-400);margin-top:10px;" id="resultFooter"></div>
  </div>

</main>

<script>
  let currentTaskId = null;
  let allResults = [];
  let eventSource = null;
  let stopped = false;

  // URL 璁℃暟
  document.getElementById("urlInput").addEventListener("input", function() {
    const lines = this.value.split("\n").filter(l => l.trim());
    document.getElementById("urlCount").textContent = `宸茶緭鍏?${lines.length} 涓?URL`;
  });

  function startCheck() {
    const raw = document.getElementById("urlInput").value;
    const urls = raw.split("\n").map(u => u.trim()).filter(u => u);
    if (!urls.length) { alert("璇疯緭鍏ヨ嚦灏戜竴涓?URL"); return; }

    stopped = false;
    allResults = [];
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("exportBtn").disabled = true;
    document.getElementById("progress-card").style.display = "block";
    document.getElementById("results-card").style.display = "none";
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("stat-total").textContent = "0";
    document.getElementById("stat-404").textContent = "0";
    document.getElementById("stat-error").textContent = "0";
    document.getElementById("stat-pages").textContent = urls.length;

    fetch("/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { alert(data.error); resetUI(); return; }
      currentTaskId = data.task_id;
      listenProgress(currentTaskId);
    });
  }

  function listenProgress(taskId) {
    if (eventSource) eventSource.close();
    eventSource = new EventSource(`/progress/${taskId}`);

    eventSource.onmessage = function(e) {
      if (stopped) { eventSource.close(); return; }
      const d = JSON.parse(e.data);

      // 鏇存柊杩涘害鏉?      const pct = d.total > 0 ? Math.round((d.progress / d.total) * 100) : 0;
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressMsg").textContent = d.message;
      document.getElementById("progressDetail").textContent =
        d.total > 0 ? `${d.progress} / ${d.total}  (${pct}%)` : "";

      // 闃舵寰界珷
      const badge = document.getElementById("phaseBadge");
      const phaseMap = {
        fetch: ["姝ｅ湪鎶撳彇椤甸潰", "phase-fetch"],
        check_start: ["寮€濮嬫娴嬮摼鎺?, "phase-check"],
        checking: ["妫€娴嬩腑", "phase-check"],
        done: ["妫€娴嬪畬鎴?, "phase-done"],
        init: ["鍒濆鍖?, "phase-init"],
      };
      const [label, cls] = phaseMap[d.phase] || ["杩愯涓?, "phase-init"];
      badge.textContent = label;
      badge.className = "phase-badge " + cls;

      // 瀹炴椂缁熻
      document.getElementById("stat-total").textContent = d.total || 0;
      document.getElementById("stat-404").textContent = d.problem_count || 0;

      if (d.status === "done") {
        eventSource.close();
        loadResults(taskId);
      }
    };
  }

  function loadResults(taskId) {
    fetch(`/results/${taskId}`)
      .then(r => r.json())
      .then(data => {
        allResults = data.problems || [];
        document.getElementById("stat-total").textContent = data.total_checked || 0;
        document.getElementById("stat-404").textContent =
          allResults.filter(r => r.status_code === 404).length;
        document.getElementById("stat-error").textContent =
          allResults.filter(r => r.status_code !== 404).length;

        renderTable(allResults);
        document.getElementById("results-card").style.display = "block";
        document.getElementById("exportBtn").disabled = allResults.length === 0;
        resetUI();
      });
  }

  function renderTable(data) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    if (!data.length) {
      document.getElementById("emptyState").style.display = "block";
      document.getElementById("resultFooter").textContent = "";
      return;
    }
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("resultFooter").textContent = `鍏?${data.length} 鏉￠棶棰樿褰昤;

    data.forEach((r, i) => {
      const tr = document.createElement("tr");
      const statusBadge = getStatusBadge(r.status_code, r.status_label);
      tr.innerHTML = `
        <td style="color:var(--gray-400);font-size:12px;">${i+1}</td>
        <td class="td-url"><a href="${esc(r.full_url||r.url)}" target="_blank" title="${esc(r.full_url||r.url)}">${truncate(r.full_url||r.url, 50)}</a></td>
        <td class="td-url"><a href="${esc(r.source_page)}" target="_blank">${truncate(r.source_page, 40)}</a></td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.anchor_text)}">${esc(r.anchor_text||'鈥?)}</td>
        <td><span class="badge badge-type">${esc(r.anchor_type||'鈥?)}</span></td>
        <td style="font-size:12px;color:var(--gray-600);">${esc(r.link_category||'鈥?)}</td>
        <td><span class="badge badge-pos">${esc(r.element_position||'鈥?)}</span></td>
        <td>${statusBadge}</td>
        <td style="font-size:11px;color:var(--gray-400);white-space:nowrap;">${esc(r.check_time||'鈥?)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function getStatusBadge(code, label) {
    if (code === 404) return `<span class="badge badge-404">404</span>`;
    if (code >= 500) return `<span class="badge badge-500">${code}</span>`;
    if (code === -1) return `<span class="badge badge-timeout">瓒呮椂</span>`;
    if (code === -2) return `<span class="badge badge-timeout">杩炴帴澶辫触</span>`;
    return `<span class="badge badge-other">${label||code}</span>`;
  }

  let currentFilter = "all";
  let currentSearch = "";

  function filterResults(type, el) {
    currentFilter = type;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    applyFilters();
  }

  function searchResults(val) {
    currentSearch = val.toLowerCase();
    applyFilters();
  }

  function applyFilters() {
    let data = [...allResults];
    if (currentFilter === "404") data = data.filter(r => r.status_code === 404);
    else if (currentFilter === "5xx") data = data.filter(r => r.status_code >= 500 && r.status_code < 600);
    else if (currentFilter === "timeout") data = data.filter(r => r.status_code < 0);
    if (currentSearch) {
      data = data.filter(r =>
        (r.full_url||"").toLowerCase().includes(currentSearch) ||
        (r.source_page||"").toLowerCase().includes(currentSearch) ||
        (r.anchor_text||"").toLowerCase().includes(currentSearch)
      );
    }
    renderTable(data);
  }

  function exportExcel() {
    if (!currentTaskId) return;
    window.location.href = `/export/${currentTaskId}`;
  }

  function stopCheck() {
    stopped = true;
    if (eventSource) eventSource.close();
    resetUI();
    document.getElementById("progressMsg").textContent = "宸叉墜鍔ㄥ仠姝?;
  }

  function resetUI() {
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
  }

  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function truncate(s, n) {
    s = String(s||"");
    return s.length > n ? s.slice(0, n) + "鈥? : s;
  }
</script>
</body>
</html>
