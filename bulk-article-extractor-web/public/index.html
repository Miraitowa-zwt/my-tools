<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Article Extractor + SEO Generator</title>
    <style>
        /* Linear Design System - getdesign.md linear.app */
        :root {
            --bg-page: #08090a;
            --bg-panel: #0f1011;
            --bg-surface: #191a1b;
            --bg-elevation: rgba(255,255,255,0.02);
            --bg-elevation-2: rgba(255,255,255,0.04);
            --text-primary: #ffffff;  /* Brighter for better readability */
            --text-secondary: #e5e7eb;  /* Brighter secondary text */
            --text-tertiary: #adbac7;  /* Brighter tertiary text */
            --text-quaternary: #9aa0a6;  /* Brighter quaternary text */
            --brand-indigo: #5e6ad2;
            --accent-violet: #7170ff;
            --accent-hover: #828fff;
            --success-green: #10b981;
            --error-red: #ef4444;
            --border-default: rgba(255,255,255,0.08);
            --border-subtle: rgba(255,255,255,0.05);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-card: 8px;
            --radius-panel: 12px;
        }
            --brand-indigo: #5e6ad2;
            --accent-violet: #7170ff;
            --accent-hover: #828fff;
            --success-green: #10b981;
            --error-red: #ef4444;
            --border-default: rgba(255,255,255,0.08);
            --border-subtle: rgba(255,255,255,0.05);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-card: 8px;
            --radius-panel: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter Variable', -apple-system, system-ui, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Open Sans, Helvetica Neue;
            font-feature-settings: "cv01", "ss03";
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Typography - Linear style */
        h1 {
            font-size: 48px;
            font-weight: 510;
            line-height: 1.00;
            letter-spacing: -1.056px;
            color: var(--text-primary);
            text-align: left;
            margin-bottom: 8px;
        }

        .description {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.60;
            letter-spacing: -0.165px;
            color: var(--text-tertiary);
            margin-bottom: 32px;
        }

        /* Panel */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-panel);
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-header {
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 590;
            line-height: 1.33;
            letter-spacing: -0.24px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .panel-subtitle {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-tertiary);
        }

        /* Input */
        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 510;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 14px;
            background: var(--bg-elevation);
            color: var(--text-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            resize: vertical;
            font-size: 14px;
            line-height: 1.5;
            font-family: inherit;
            font-feature-settings: "cv01", "ss03";
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow: rgba(0,0,0,0.1) 0px 4px 12px;
        }

        .hint {
            font-size: 13px;
            color: var(--text-quaternary);
            margin-top: 8px;
        }

        /* Buttons */
        .button-group {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 510;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            background: var(--bg-elevation);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-feature-settings: "cv01", "ss03";
        }

        button:hover:not(:disabled) {
            background: var(--bg-elevation-2);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--brand-indigo);
            border-color: var(--brand-indigo);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-violet);
            border-color: var(--accent-violet);
        }

        .btn-primary:active:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success-green);
            border-color: var(--success-green);
            color: white;
        }

        /* Status */
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            display: none;
            font-size: 14px;
            font-weight: 400;
        }

        .status.loading {
            display: block;
            background: rgba(94, 106, 210, 0.1);
            color: var(--accent-violet);
            border: 1px solid rgba(113, 112, 255, 0.2);
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Result Article Card */
        .result-article {
            background: var(--bg-panel);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-panel);
            padding: 20px;
            margin-bottom: 24px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .result-info h3 {
            font-size: 20px;
            font-weight: 590;
            line-height: 1.33;
            letter-spacing: -0.24px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .result-url {
            font-size: 13px;
            color: var(--text-quaternary);
            word-break: break-all;
        }

        .result-meta {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .copy-btn {
            background: var(--success-green);
            border-color: var(--success-green);
            color: white;
            padding: 6px 16px;
            font-size: 14px;
            white-space: nowrap;
        }

        .copy-btn.copied {
            background: var(--success-green);
            opacity: 0.8;
        }

        .content-container {
            margin-bottom: 16px;
        }

        .content-label {
            font-size: 14px;
            font-weight: 510;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .result-content textarea {
            min-height: 200px;
            background: var(--bg-elevation);
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            resize: vertical;
            font-size: 14px;
            line-height: 1.6;
            font-family: inherit;
        }

        /* SEO Section */
        .seo-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .seo-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            .seo-cards {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .seo-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-card);
            padding: 16px;
        }

        .seo-card-title {
            font-size: 16px;
            font-weight: 590;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .seo-item {
            margin-bottom: 12px;
        }

        .seo-item-label {
            font-size: 13px;
            font-weight: 510;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .seo-item-value {
            background: var(--bg-elevation);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            color: var(--text-primary);
            font-size: 14px;
            word-break: break-word;
        }

        .seo-item-value-zh {
            color: var(--text-tertiary);
            font-size: 13px;
            margin-top: 4px;
        }

        .seo-meta-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            .seo-meta-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        .seo-keywords, .seo-tags {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-card);
            padding: 16px;
        }

        .tag {
            display: inline-block;
            background: transparent;
            border: 1px solid rgb(35, 37, 42);
            border-radius: 9999px;
            padding: 0px 10px 0px 5px;
            font-size: 12px;
            font-weight: 510;
            color: var(--text-secondary);
            margin: 0 6px 6px 0;
        }

        /* Loading */
        .loading-item {
            background: var(--bg-panel);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-panel);
            padding: 24px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-quaternary);
            font-size: 13px;
        }

        .hide {
            display: none;
        }

        /* SEO Generation */
        .generate-seo-btn {
            margin-top: 12px;
        }

        .download-csv-btn {
            background: var(--brand-indigo);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Bulk Article Extractor</h1>
        <p class="description">提取文章正文 • 生成 SEO 元数据 • 导出 CSV • Linear 深色开发者风格</p>

        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">输入 URL</h2>
                <p class="panel-subtitle">输入多个文章 URL，每行一个</p>
            </div>
            <label class="form-label" for="urlsInput">URL List</label>
            <textarea id="urlsInput" placeholder="https://example.com/article-1
https://example.com/article-2"></textarea>
            <p class="hint">💡 本地后端服务，无 CORS 问题</p>
            <div class="button-group">
                <button id="extractBtn" class="btn-primary" onclick="extractArticles()">开始提取 ⚡</button>
                <button id="clearBtn" onclick="clearAllResults()">清空结果</button>
                <button id="downloadCSV" class="btn-primary download-csv-btn" onclick="downloadCSV()" disabled>下载 CSV ✦</button>
            </div>
            <div id="status" class="status"></div>
        </div>

        <div id="resultsSection"></div>

        <div class="footer">
            <p>Powered by Mozilla Readability • Linear Design by getdesign.md • SEO Generator for Bloggers</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
